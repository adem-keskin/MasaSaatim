# distributionBase ve distributionPath: İnternetten indirilen Gradle paketinin
# bilgisayarınızın diskinde hangi yerel klasöre çıkartılacağını ve saklanacağını belirler.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists

# EN KRİTİK SATIR: Projenizin derlenirken kullanacağı resmi Gradle sürümünü (Sürüm 8.5) tanımlar.
# Android Studio bu adresi okur ve eğer bilgisayarınızda bu sürüm yoksa arka planda otomatik indirir.
# Sonundaki "-all.zip" eki, kütüphanenin kaynak kodlarını ve dökümantasyonunu da içerdiği için
# kodlama esnasında hata ayıklamayı (debugging) çok daha kolaylaştırır.
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-all.zip

# zipStoreBase ve zipStorePath: İnternetten indirilen sıkıştırılmış ham .zip dosyasının
# ileride tekrar kullanılabilmesi için önbellekte (cache) tutulacağı dizini tanımlar.
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
